name: Build and Commit Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            output: editormind-mcp-win.exe
          - os: macos-latest
            target: bun-darwin-arm64
            output: editormind-mcp-macos
          - os: ubuntu-latest
            target: bun-linux-x64
            output: editormind-mcp-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: UnityPackage/Server~
        run: bun install

      - name: Build binary
        working-directory: UnityPackage/Server~
        run: bun build index.js --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: UnityPackage/Server~/bin/${{ matrix.output }}

  commit-binaries:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: UnityPackage/Server~/bin
          merge-multiple: true

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UnityPackage/Server~/bin/
          git diff --staged --quiet || git commit -m "ci: update binaries [skip ci]"
          git push origin HEAD:main

  release:
    needs: commit-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}